name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run unit tests
        working-directory: ${{ github.workspace }}/tests
        run: |
          cmake -B build
          cmake --build build
          ./build/poolconductor_tests

  build:
    needs: test
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/.ghcup
          sudo apt-get clean -y
          docker image prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean stale build artifacts
        run: |
          rm -rf build/
          df -h

      - name: Cache ESP-IDF
        id: cache-idf
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: idf-v6.0.2-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install ESP-IDF v6.0.2
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.espressif
          cd ~/.espressif
          git clone --branch v6.0.2 --depth 1 --recursive https://github.com/espressif/esp-idf.git v6.0.2/esp-idf
          cd v6.0.2/esp-idf
          ./install.sh esp32s3

      - name: Set up ESP-IDF environment
        run: |
          . ~/.espressif/v6.0.2/esp-idf/export.sh
          echo "$PATH" >> $GITHUB_PATH
          echo "IDF_PATH=$HOME/.espressif/v6.0.2/esp-idf" >> $GITHUB_ENV
          echo "ESP_MATTER_PATH=$HOME/esp/esp-matter" >> $GITHUB_ENV

      - name: Cache esp-matter
        id: cache-matter
        uses: actions/cache@v4
        with:
          path: ~/esp/esp-matter
          key: esp-matter-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install esp-matter
        if: steps.cache-matter.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/esp
          cd ~/esp
          git clone --branch release/v1.4 --depth 1 --recursive https://github.com/espressif/esp-matter.git
          cd esp-matter/connectedhomeip/connectedhomeip
          ./scripts/checkout_submodules.py --platform esp32 --shallow

      - name: Set target
        working-directory: ${{ github.workspace }}
        run: |
          . ~/.espressif/v6.0.2/esp-idf/export.sh
          idf.py set-target esp32s3

      - name: Build
        working-directory: ${{ github.workspace }}
        run: |
          . ~/.espressif/v6.0.2/esp-idf/export.sh
          export ESP_MATTER_PATH=$HOME/esp/esp-matter
          idf.py build

      - name: Clean build artifacts
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          . ~/.espressif/v6.0.2/esp-idf/export.sh
          idf.py fullclean || rm -rf build/
          df -h
